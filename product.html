<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini Vandi</title>

    <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="images/logo.jpg">


</head>

<body>

<nav>
    <div class="logo">Mini Vandi</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#products">Products</a></li>
    </ul>
</nav>

<section class="product-detail">

    <div class="product-image">

        <div class="image-box">
            <img id="main-image">
        </div>
        <div class="thumbnail-container" id="thumbnail-container">
            
        </div>
    </div>

    <div class="product-info">

        <span class="badge">🔥 Best Seller</span>

        <h1 id="product-name"></h1>

        <div class="price" id="product-price"></div>

        <p class="delivery-note">
            + ₹50 Delivery Charge
        </p>

        <p class="description" id="product-description"></p>

        <div class="details">

            <div class="detail">
                🚚 Delivery in 3–4 Days
            </div>

            <div class="detail">
                ⭐ Collector's Edition
            </div>

            <div class="detail">
                ✔ Premium Quality
            </div>

        </div>

        <div class="select-group">

            <label>Color</label>

            <select id="color" onchange="changeColor()">

            </select>

        </div>

        <div class="select-group">

            <label>Quantity</label>

            <select id="qty" onchange="updateTotal()">

                <option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
<option value="19">19</option>
<option value="20">20</option>
<option value="21">21</option>
<option value="22">22</option>
<option value="23">23</option>
<option value="24">24</option>
<option value="25">25</option>
<option value="26">26</option>
<option value="27">27</option>
<option value="28">28</option>
<option value="29">29</option>
<option value="30">30</option>

            </select>

        </div>

        <p id="total-price"></p>

        <button class="buy-btn" onclick="buyProduct()">
            Buy Now
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
