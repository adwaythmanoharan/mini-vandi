<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Vandi - Product Details</title>
    
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo.jpg">

    <style>
        :root {
            --bg-dark: #0f0f11;
            --surface-dark: #18181c;
            --surface-card: #222226;
            --accent: #e11d48; /* Sleek red/crimson accent - feel free to adjust to your brand color */
            --accent-hover: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e2e35;
            --radius: 14px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 6%;
            background: rgba(24, 24, 28, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        nav ul a:hover {
            color: var(--accent);
        }

        /* Container */
        .product-detail-container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        /* Product Card */
        .product-card {
            background: var(--surface-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            padding: 2.5rem;
        }

        @media (min-width: 768px) {
            .product-card {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Gallery */
        .product-image-gallery {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-box {
            width: 100%;
            height: 380px;
            background-color: var(--surface-card);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .image-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .image-box img:hover {
            transform: scale(1.05);
        }

        .thumbnail-container {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .thumbnail-container img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            background-color: var(--surface-card);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .thumbnail-container img.active,
        .thumbnail-container img:hover {
            border-color: var(--accent);
            opacity: 0.9;
        }

        /* Info Section */
        .product-info {
            display: flex;
            flex-direction: column;
        }

        .badge-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .badge {
            background: rgba(225, 29, 72, 0.15);
            color: var(--accent);
            border: 1px solid rgba(225, 29, 72, 0.3);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
        }

        #product-name {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            color: var(--text-main);
            line-height: 1.2;
        }

        .price-group {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .delivery-note {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
            margin: 0;
        }

        .description {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        /* Features */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .feature-item {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feature-item i {
            color: var(--accent);
        }

        /* Controls */
        .controls-wrapper {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .select-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .select-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .select-group select,
        .select-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            background: var(--surface-card);
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        .select-group select:focus,
        .select-group input:focus {
            border-color: var(--accent);
        }

        /* Summary & Action */
        .total-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-top: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .total-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        #total-price {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
        }

        .buy-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }

        .buy-btn:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 6px 16px rgba(225, 29, 72, 0.4);
        }

        .buy-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Mini Vandi</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#products">Products</a></li>
        </ul>
    </nav>

    <main class="product-detail-container">

        <a href="index.html#products" class="back-link">
            ← Back to Products
        </a>

        <section class="product-card">

            <!-- Left: Gallery -->
            <div class="product-image-gallery">
                <div class="image-box">
                    <img id="main-image" src="" alt="Product Image">
                </div>
                <div class="thumbnail-container" id="thumbnail-container">
                    <!-- Dynamic thumbnails rendered here -->
                </div>
            </div>

            <!-- Right: Product Info -->
            <div class="product-info">

                <div class="badge-wrapper">
                    <span class="badge">🔥 Best Seller</span>
                </div>

                <h1 id="product-name">Loading...</h1>

                <div class="price-group">
                    <div class="price" id="product-price">₹0</div>
                    <span class="delivery-note">+ ₹50 Delivery</span>
                </div>

                <p class="description" id="product-description">
                    Loading details...
                </p>

                <div class="features-grid">
                    <div class="feature-item">
                        🚚 3–4 Days Delivery
                    </div>
                    <div class="feature-item">
                        ⭐ Collector's Edition
                    </div>
                    <div class="feature-item">
                        ✔ Premium Quality
                    </div>
                </div>

                <div class="controls-wrapper">
                    <div class="select-group">
                        <label for="color">Color</label>
                        <select id="color" onchange="changeColor()">
                            <!-- Dynamically populated -->
                        </select>
                    </div>

                    <div class="select-group">
                        <label for="qty">Quantity</label>
                        <input type="number" id="qty" min="1" max="30" value="1" onchange="updateTotal()" oninput="updateTotal()">
                    </div>
                </div>

                <div class="total-box">
                    <span class="total-label">Total Amount</span>
                    <p id="total-price">₹0</p>
                </div>

                <button class="buy-btn" onclick="buyProduct()">
                    Buy Now
                </button>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
